<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Voetbal Trainingen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1rem; }
    .app { max-width: 600px; margin: 0 auto; padding: 0.75rem 0; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
    .header h1 { font-size: 17px; font-weight: 500; color: #1a1a1a; flex: 1; }
    .back-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer; color: #555; min-height: 40px; font-family: inherit; }
    .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .tab { flex: 1; padding: 10px 8px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 14px; cursor: pointer; color: #888; text-align: center; min-height: 44px; display: flex; align-items: center; justify-content: center; font-family: inherit; }

    .day-card .trainer { font-size: 12px; color: #aaa; margin-bottom: 2px; }
    .day-card .total-time { font-size: 11px; color: #aaa; margin-bottom: 8px; }
    .time-bar-bg { height: 3px; background: #e8e8e2; border-radius: 99px; margin-bottom: 10px; }
    .time-bar-fill { height: 3px; border-radius: 99px; transition: width 0.3s; }
    .training-item { background: #f5f5f0; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; min-height: 56px; display: flex; flex-direction: column; justify-content: center; }
    .training-item .name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .training-item .meta { font-size: 12px; color: #888; margin-top: 3px; }
    .add-btn { width: 100%; padding: 10px 8px; border: 1px dashed #ccc; border-radius: 8px; background: transparent; color: #aaa; font-size: 13px; cursor: pointer; margin-top: 4px; min-height: 44px; font-family: inherit; }
    .form-card { background: #fff; border: 1px solid #e8e8e2; border-radius: 12px; padding: 1.125rem; margin-bottom: 1rem; }

    .field { margin-bottom: 14px; }

    .field input, .field select, .field textarea { width: 100%; border-radius: 8px; font-size: 16px; min-height: 44px; padding: 10px 12px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-family: inherit; }
    .field textarea { height: 90px; resize: vertical; min-height: 90px; font-size: 15px; }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #888; }

    .detail-section { margin-bottom: 1.25rem; }
    .detail-section h4 { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .oef-detail-card { background: #f5f5f0; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; width: 100%; box-sizing: border-box; overflow: hidden; }
    .oef-detail-card .oef-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .oef-detail-card .oef-title { font-size: 15px; font-weight: 500; color: #1a1a1a; word-break: break-word; }

    .lightbox-counter { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 8px; font-family: inherit; }

<script>
// =============================================
// ALLE STATE EN UI FUNCTIES - geen module, dus
// direct beschikbaar als onclick handlers
// =============================================

const MAX_TIJD = { Maandag: 75, Woensdag: 90 };
const MAANDEN = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

let trainingen = [];
let oefeningen = [], tempImgs = [];
let editIndex = -1, currentTrainingIdx = -1, currentOefIdx = -1;
let oefContext = 'training-form'; // 'training-form' of 'detail'
let historieOpen = false;
let lightboxImgs = [], lightboxIdx = 0;

// Firebase save/delete worden later ingesteld vanuit het module script
let _saveToFirebase = async (t) => { console.log('Firebase nog niet klaar'); };
let _deleteFromFirebase = async (id) => { console.log('Firebase nog niet klaar'); };

// ---- Datum helpers ----
function getNextWeekBounds() {
  const now = new Date(); now.setHours(0,0,0,0);
  const day = now.getDay(); // 0=zo,1=ma,2=di,3=wo,4=do,5=vr,6=za
  // Dagen tot eerstvolgende maandag (nooit vandaag als het maandag is)
  const daysToMonday = day === 0 ? 1 : 8 - day;
  const nextMonday = new Date(now);
  nextMonday.setDate(now.getDate() + daysToMonday);
  const nextWoensdag = new Date(nextMonday);
  nextWoensdag.setDate(nextMonday.getDate() + 2);
  return { nextMonday, nextWoensdag };
}

function getWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay()||7));
  return Math.ceil((((date - new Date(Date.UTC(date.getUTCFullYear(),0,1)))/86400000)+1)/7);
}

function isVolgendeWeek(datum, dag) {
  if (!datum) return false;
  const d = new Date(datum + 'T12:00:00');
  const { nextMonday, nextWoensdag } = getNextWeekBounds();
  if (dag === 'Maandag') return d.toDateString() === nextMonday.toDateString();
  if (dag === 'Woensdag') return d.toDateString() === nextWoensdag.toDateString();
  return false;
}

function isInToekomst(datum) {
  if (!datum) return true;
  const today = new Date(); today.setHours(0,0,0,0);
  return new Date(datum + 'T12:00:00') > today;
}

function formatDatum(datum) {
  if (!datum) return '';
  const d = new Date(datum + 'T12:00:00');
  return `${d.getDate()} ${MAANDEN[d.getMonth()]} ${d.getFullYear()}`;
}

function defaultNaam(datum) {
  return datum ? `Training ${formatDatum(datum)}` : 'Nieuwe training';
}

function updateNaamFromDatum() {
  const datum = document.getElementById('f-datum').value;
  const naam = document.getElementById('f-naam').value;
  if (!naam || naam.startsWith('Training ') || naam === 'Nieuwe training') {
    document.getElementById('f-naam').value = defaultNaam(datum);
  }
}

function onDatumChange() {
  const datum = document.getElementById('f-datum').value;
  const hint = document.getElementById('datum-hint');
  document.getElementById('f-datum').classList.remove('error');
  if (datum && !isInToekomst(datum)) {
    hint.textContent = 'Datum in het verleden — training verschijnt in de historie';
    hint.style.color = '#888';
    hint.classList.add('show');
  } else {
    hint.classList.remove('show');
  }
  updateNaamFromDatum();
}

// ---- Lightbox ----
function openLightbox(imgs, idx) {
  lightboxImgs = Array.isArray(imgs) ? imgs : [];
  lightboxIdx = idx || 0;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
}
function updateLightbox() {
  document.getElementById('lightbox-img').src = lightboxImgs[lightboxIdx] || '';
  document.getElementById('lightbox-counter').textContent =
    lightboxImgs.length > 1 ? `${lightboxIdx+1} / ${lightboxImgs.length}` : '';
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function lightboxNav(dir) {
  if (!lightboxImgs.length) return;
  lightboxIdx = (lightboxIdx + dir + lightboxImgs.length) % lightboxImgs.length;
  updateLightbox();
}

// ---- Tijd ----
function getOefeningenMins() { return oefeningen.reduce((s,o)=>s+(parseInt(o.dur)||0),0); }
function getTotalMins(dag) {
  return trainingen.filter(t=>t.dag===dag && isVolgendeWeek(t.datum, dag))
    .flatMap(t=>t.oefeningen).reduce((s,o)=>s+(parseInt(o.dur)||0),0);
}
function updateFormTimeHint() {
  const dag = document.getElementById('f-dag')?.value||'Woensdag';
  const max=MAX_TIJD[dag], used=getOefeningenMins();
  const el=document.getElementById('form-time-hint');
  if (!el) return;
  if (!used) { el.textContent=`max ${max} min`; el.style.color='#aaa'; return; }
  const rest=max-used;
  if (rest<0) { el.textContent=`${used} min — ${Math.abs(rest)} te lang!`; el.style.color='#BA7517'; }
  else if (rest===0) { el.textContent=`${used}/${max} min — vol`; el.style.color='#3B6D11'; }
  else { el.textContent=`${used}/${max} min — nog ${rest} min`; el.style.color='#888'; }
}

// ---- Scherm navigatie ----
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active', s.id==='screen-'+name));
}
function showMainTab(tab) {
  document.getElementById('tab-overzicht').style.display=tab==='overzicht'?'':'none';
  document.getElementById('tab-nieuw').style.display=tab==='nieuw'?'':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='overzicht')||(i===1&&tab==='nieuw')));
  if (tab==='overzicht') renderOverzicht();
  if (tab==='nieuw') updateFormTimeHint();
}
function goBack() { showScreen('overzicht'); renderOverzicht(); }
function terugVanuitEdit() {
  if (oefContext === 'detail') {
    openOefeningView(currentOefIdx);
  } else {
    showScreen('overzicht'); showMainTab('nieuw');
  }
}

function toggleHistorie() {
  historieOpen=!historieOpen;
  document.getElementById('historie-list').classList.toggle('open',historieOpen);
  document.getElementById('historie-arrow').textContent=historieOpen?'▴':'▾';
  if (historieOpen) renderHistorie();
}

// ---- Render ----
function setSyncStatus(state, msg) {
  const el=document.getElementById('sync-status');
  if (!el) return;
  el.className='sync-bar '+state;
  const dot=state==='ok'?'green':state==='error'?'red':'gray';
  el.innerHTML=`<div class="dot ${dot}"></div><span>${msg}</span>`;
}

function renderHistorie() {
  const el=document.getElementById('historie-list');
  const oud=trainingen
    .filter(t=>!isVolgendeWeek(t.datum, t.dag))
    .sort((a,b)=>(b.datum||'').localeCompare(a.datum||''));
  if (!oud.length) { el.innerHTML='<div class="empty" style="padding:8px;">Geen eerdere trainingen</div>'; return; }
  el.innerHTML=oud.map(t=>{
    const idx=trainingen.indexOf(t);
    const mins=t.oefeningen.reduce((s,o)=>s+(parseInt(o.dur)||0),0);
    return `<div class="historie-item" onclick="openTraining(${idx})">
      <div class="name">${t.naam}</div>
      <div class="meta"><span class="badge ${t.dag==='Maandag'?'badge-ma':'badge-wo'}">${t.dag}</span>&nbsp;${t.datum?formatDatum(t.datum):''} &middot; ${mins} min</div>
    </div>`;
  }).join('');
}

function renderOverzicht() {
  const { nextMonday, nextWoensdag }=getNextWeekBounds();
  document.getElementById('week-label').textContent=
    `Week ${getWeek(nextMonday)} — ma ${nextMonday.getDate()} ${MAANDEN[nextMonday.getMonth()]} & wo ${nextWoensdag.getDate()} ${MAANDEN[nextWoensdag.getMonth()]}`;
  ['Maandag','Woensdag'].forEach(dag=>{
    const sfx=dag==='Maandag'?'ma':'wo';
    const items=trainingen.filter(t=>t.dag===dag && isVolgendeWeek(t.datum, dag));
    const used=getTotalMins(dag), max=MAX_TIJD[dag], pct=Math.min(100,Math.round(used/max*100));
    const timeEl=document.getElementById('time-'+sfx), barEl=document.getElementById('bar-'+sfx);
    barEl.style.width=pct+'%';
    if (used>max) { timeEl.textContent=`${used}/${max} min — ${used-max} te lang`; timeEl.style.color='#BA7517'; barEl.style.background='#BA7517'; }
    else if (used===0) { timeEl.textContent=`0/${max} min`; timeEl.style.color='#aaa'; }
    else { timeEl.textContent=`${used}/${max} min`; timeEl.style.color='#aaa'; barEl.style.background=dag==='Maandag'?'#378ADD':'#639922'; }
    const el=document.getElementById('list-'+sfx);
    if (!items.length) { el.innerHTML='<div class="empty">Nog geen training gepland</div>'; return; }
    el.innerHTML=items.map(t=>{
      const idx=trainingen.indexOf(t);
      const mins=t.oefeningen.reduce((s,o)=>s+(parseInt(o.dur)||0),0);
      const oefPreview = t.oefeningen.length
        ? t.oefeningen.map(o=>{
            const cat = o.cat ? `<span style="font-size:10px;color:#3B6D11;background:#EAF3DE;padding:1px 5px;border-radius:99px;margin-left:3px;">${o.cat}</span>` : '';
            return `<div style="display:flex;align-items:center;padding:4px 0;border-top:1px solid #e8e8e2;gap:6px;">
              <span style="font-size:12px;color:#1a1a1a;flex:1;">${o.naam}</span>
              ${cat}
              <span style="font-size:11px;color:#aaa;flex-shrink:0;">${o.dur} min</span>
            </div>`;
          }).join('')
        : '';
      return `<div class="training-item" onclick="openTraining(${idx})">
        <div class="name">${t.naam}</div>
        <div class="meta">${t.oefeningen.length} oef. &middot; ${mins} min &middot; ${t.intensiteit}</div>
        ${oefPreview ? `<div style="margin-top:6px;">${oefPreview}</div>` : ''}
      </div>`;
    }).join('');
  });
  if (historieOpen) renderHistorie();
}

function openTraining(idx) {
  currentTrainingIdx=idx;
  const t=trainingen[idx];
  const mins=t.oefeningen.reduce((s,o)=>s+(parseInt(o.dur)||0),0);
  document.getElementById('detail-title').textContent=t.naam;
  document.getElementById('detail-meta').innerHTML=
    `<span class="badge ${t.dag==='Maandag'?'badge-ma':'badge-wo'}">${t.dag}</span>${t.datum?' &nbsp;'+formatDatum(t.datum):''} &nbsp;&middot;&nbsp; ${t.intensiteit} &nbsp;&middot;&nbsp; ${mins}/${MAX_TIJD[t.dag]} min`;
  const ns=document.getElementById('detail-notes-section');
  if (t.notes) { ns.style.display=''; document.getElementById('detail-notes').textContent=t.notes; } else ns.style.display='none';
  renderDetailOef(t);
  showScreen('training');
}

function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function removeImg(i) { tempImgs.splice(i,1); renderTempImgs(); }

function compressImg(file, callback) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = function() {
    const MAX = 800;
    let w = img.width, h = img.height;
    if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    // Probeer kwaliteit 0.7, als te groot dan verder comprimeren
    let result = canvas.toDataURL('image/jpeg', 0.7);
    let kb = Math.round(result.length * 0.75 / 1024);
    if (kb > 200) result = canvas.toDataURL('image/jpeg', 0.5);
    kb = Math.round(result.length * 0.75 / 1024);
    if (kb > 200) result = canvas.toDataURL('image/jpeg', 0.3);
    console.log('Afbeelding na compressie: ' + Math.round(result.length * 0.75 / 1024) + ' KB');
    URL.revokeObjectURL(url);
    callback(result);
  };
  img.src = url;
}

function handleImgUpload(e) {
  Array.from(e.target.files).forEach(file=>{
    compressImg(file, compressed => {
      tempImgs.push(compressed);
      renderTempImgs();
    });
  });
  e.target.value='';
}

let dragSrcIdx = -1;
let touchDragEl = null;
let touchDragIdx = -1;

function initDragDrop() {
  const items = document.querySelectorAll('#oef-form-list .oef-expand');
  items.forEach(item => {
    // Desktop drag & drop
    item.addEventListener('dragstart', e => {
      dragSrcIdx = parseInt(item.dataset.idx);
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      document.querySelectorAll('#oef-form-list .oef-expand').forEach(i => i.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      document.querySelectorAll('#oef-form-list .oef-expand').forEach(i => i.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      const targetIdx = parseInt(item.dataset.idx);
      if (dragSrcIdx !== -1 && dragSrcIdx !== targetIdx) {
        const moved = oefeningen.splice(dragSrcIdx, 1)[0];
        oefeningen.splice(targetIdx, 0, moved);
        renderOefFormList();
      }
    });

    // Touch drag & drop voor mobiel
    const handle = item.querySelector('.drag-handle');
    if (handle) {
      handle.addEventListener('touchstart', e => {
        touchDragIdx = parseInt(item.dataset.idx);
        touchDragEl = item;
        item.classList.add('dragging');
      }, { passive: true });

      handle.addEventListener('touchmove', e => {
        e.preventDefault();
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const target = el ? el.closest('.oef-expand') : null;
        document.querySelectorAll('#oef-form-list .oef-expand').forEach(i => i.classList.remove('drag-over'));
        if (target && target !== touchDragEl) target.classList.add('drag-over');
      }, { passive: false });

      handle.addEventListener('touchend', e => {
        const touch = e.changedTouches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const target = el ? el.closest('.oef-expand') : null;
        if (target && target !== touchDragEl) {
          const targetIdx = parseInt(target.dataset.idx);
          if (touchDragIdx !== -1 && touchDragIdx !== targetIdx) {
            const moved = oefeningen.splice(touchDragIdx, 1)[0];
            oefeningen.splice(targetIdx, 0, moved);
            renderOefFormList();
          }
        } else {
          document.querySelectorAll('#oef-form-list .oef-expand').forEach(i => i.classList.remove('drag-over', 'dragging'));
        }
        touchDragEl = null; touchDragIdx = -1;
      }, { passive: true });
    }
  });
}

function removeOefFromForm(i) { oefeningen.splice(i,1); renderOefFormList(); }

  editIndex=currentTrainingIdx;
  const t=trainingen[editIndex];
  oefeningen=t.oefeningen.map(o=>({...o,imgs:o.imgs?[...o.imgs]:[]}));
  document.getElementById('f-naam').value=t.naam;
  document.getElementById('f-datum').value=t.datum||'';
  document.getElementById('f-dag').value=t.dag;
  document.getElementById('f-int').value=t.intensiteit;
  document.getElementById('f-notes').value=t.notes||'';
  document.getElementById('form-title').textContent='Training bewerken';
  document.getElementById('del-btn').style.display='';
  document.getElementById('datum-hint').classList.remove('show');
  document.getElementById('f-datum').classList.remove('error');
  renderOefFormList(); showScreen('overzicht'); showMainTab('nieuw');
}

async function saveTraining() {
  const naam=document.getElementById('f-naam').value.trim();
  const datum=document.getElementById('f-datum').value;
  if (!naam) { alert('Vul een naam in'); return; }
  const t={ naam, dag:document.getElementById('f-dag').value, datum, intensiteit:document.getElementById('f-int').value, notes:document.getElementById('f-notes').value, oefeningen:[...oefeningen] };
  if (editIndex>=0) t.id=trainingen[editIndex].id;
  try {
    setSyncStatus('loading', 'Opslaan...');
    await window._saveToFirebase(t);
    showMainTab('overzicht');
  } catch(err) {
    alert('Opslaan mislukt: ' + (err.code || err.message || String(err)));
  }
}

async function deleteTraining() {
  if (!confirm('Training verwijderen?')) return;
  await window._deleteFromFirebase(trainingen[editIndex].id);
  editIndex=-1; showMainTab('overzicht');
}

// Render alvast zonder data
window.renderOverzicht = renderOverzicht;
window.setSyncStatus = setSyncStatus;
window.renderOverzicht();
</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDjTY6XFpfGdBt-8Iz7M1qWT44rys7uWi4",
  authDomain: "app-voor-voetbaltrainingen.firebaseapp.com",
  projectId: "app-voor-voetbaltrainingen",
  storageBucket: "app-voor-voetbaltrainingen.firebasestorage.app",
  messagingSenderId: "869029037781",
  appId: "1:869029037781:web:84f134fcdc051f2567445c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function laadTrainingen() {
  try {
    const snap = await db.collection('trainingen').get();
    trainingen = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    setSyncStatus('ok', 'Verbonden — ' + new Date().toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit'}));
    renderOverzicht();
  } catch(err) {
    setSyncStatus('error', 'Fout: ' + (err.code || err.message || String(err)));
  }
}

window._saveToFirebase = async function(t) {
  const id = t.id || crypto.randomUUID();
  const oefeningen = (t.oefeningen || []).map(o => ({
    naam: o.naam || '',
    dur: o.dur || '?',
    desc: o.desc || '',
    url: o.url || '',
    imgs: (o.imgs || []).filter(img => typeof img === 'string' && img.length > 0)
  }));
  const data = {
    naam: t.naam || '',
    dag: t.dag || 'Woensdag',
    datum: t.datum || '',
    intensiteit: t.intensiteit || 'Middel',
    notes: t.notes || '',
    oefeningen: oefeningen
  };
  const dataStr = JSON.stringify(data);
  const kb = Math.round(dataStr.length * 0.75 / 1024);
  console.log('Totale data voor opslaan: ' + kb + ' KB');
  if (kb > 900) {
    throw new Error('Document te groot (' + kb + ' KB). Gebruik kleinere afbeeldingen.');
  }
  await db.collection('trainingen').doc(id).set(data);
  await laadTrainingen();
  return id;
};

window._deleteFromFirebase = async function(id) {
  await db.collection('trainingen').doc(id).delete();
  await laadTrainingen();
};

// Start
laadTrainingen();
setInterval(laadTrainingen, 30000);
</script>
